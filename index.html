<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Finger Dodge Sonic Boss</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;width:100%;height:100%;overflow:hidden;
  background:#05070d;color:white;font-family:Arial,sans-serif;
  touch-action:none;overscroll-behavior:none;
}
body{display:flex;justify-content:center;align-items:center;background:radial-gradient(circle at top,#172040,#05070d 72%)}
#stage{position:relative;width:100vw;height:100dvh;display:flex;justify-content:center;align-items:center;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
canvas{display:block;background:#07090f;border:2px solid #58c8ff;box-shadow:0 0 22px #248cff;touch-action:none}
[hidden]{display:none!important}
.panel{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,.86);z-index:10;text-align:center;padding:20px}
h1{font-size:clamp(30px,8vw,52px);margin:0 0 18px;text-shadow:0 0 16px #58c8ff}
button,select{padding:12px 18px;margin:8px;font-size:20px;border-radius:8px;border:0}
button{cursor:pointer;background:#58c8ff;color:#00121f;font-weight:bold}
#hud{position:fixed;top:calc(8px + env(safe-area-inset-top));left:calc(8px + env(safe-area-inset-left));z-index:5;font-size:15px;background:rgba(0,0,0,.5);padding:8px 10px;border:1px solid #58c8ff;border-radius:8px;pointer-events:none}
#hpBox{width:160px;height:14px;border:1px solid white;margin-top:5px;background:#300}
#hpFill{height:100%;width:100%;background:#35ff69}
table{border-collapse:collapse;background:rgba(255,255,255,.08);margin:8px;font-size:14px}
td,th{border:1px solid #888;padding:6px 10px;text-align:center}
.small{opacity:.85}

#joystick{
  position:fixed;
  right:calc(18px + env(safe-area-inset-right));
  bottom:calc(18px + env(safe-area-inset-bottom));
  width:116px;height:116px;border-radius:50%;
  background:rgba(255,255,255,.10);
  border:2px solid rgba(255,255,255,.35);
  z-index:6;display:none;touch-action:none;
}
#stick{
  position:absolute;left:38px;top:38px;
  width:40px;height:40px;border-radius:50%;
  background:rgba(88,200,255,.75);
  box-shadow:0 0 14px #58c8ff;
}
@media (hover:none) and (pointer:coarse){
  #joystick{display:block}
}


.difficulty-options{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin:10px 0;
  font-size:20px;
}
.difficulty-options label{
  padding:10px 16px;
  border:1px solid rgba(88,200,255,.55);
  border-radius:10px;
  background:rgba(255,255,255,.08);
}
.difficulty-options input{
  transform:scale(1.25);
  margin-right:8px;
}

</style>
</head>
<body>
<div id="stage"><canvas id="game" width="900" height="600"></canvas></div>
<div id="joystick"><div id="stick"></div></div>

<div id="menu" class="panel">
  <h1>Finger Dodge Ultimate</h1>
  <p class="small">Máy tính: W A S D. Điện thoại: kéo trực tiếp hoặc dùng nút joystick bên phải.</p>
  <div class="difficulty-options">
    <label><input type="radio" name="difficulty" value="easy"> Dễ - 20 giây</label>
    <label><input type="radio" name="difficulty" value="normal" checked> Thường - 40 giây</label>
    <label><input type="radio" name="difficulty" value="hard"> Khó - 60 giây</label>
  </div>
  <button id="startBtn">Bắt đầu</button>
</div>

<div id="hud" hidden>
  <div>Điểm: <span id="score">0</span></div>
  <div>Còn lại: <span id="time">0</span>s</div>
  <div>Đòn tiếp: <span id="nextAttack">0.0</span>s</div>
  <div>Máu: <span id="hpText">64</span>/64</div>
  <div id="hpBox"><div id="hpFill"></div></div>
  <div>Khiên: <span id="shieldText">0</span></div>
</div>

<div id="gameover" class="panel" hidden>
  <h1>Kết thúc</h1>
  <p>Điểm: <span id="finalScore">0</span></p>
  <h3>Top 5</h3>
  <table id="leader"></table>
  <button id="againBtn">Chơi lại</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const GAME_W=900, GAME_H=600;

const menu=document.getElementById("menu");
const gameover=document.getElementById("gameover");
const hud=document.getElementById("hud");
const scoreEl=document.getElementById("score");
const timeEl=document.getElementById("time");
const nextAttackEl=document.getElementById("nextAttack");
const hpText=document.getElementById("hpText");
const hpFill=document.getElementById("hpFill");
const shieldText=document.getElementById("shieldText");
const finalScoreEl=document.getElementById("finalScore");
const leaderEl=document.getElementById("leader");
function getDifficulty(){return document.querySelector('input[name="difficulty"]:checked').value;}

let player,bullets,lasers,items,dash,boss,startTime,duration,score,ended,started;
let lastAttack,lastItem,lastDash,attackGap,bulletSpeed,difficulty,audioCtx,shake=0,sonicRings=[];
const keys={};
const joy={active:false,dx:0,dy:0};

function resizeCanvasCSS(){
  const vw=window.innerWidth, vh=window.innerHeight;
  const scale=Math.min(vw/GAME_W, vh/GAME_H)*0.985;
  canvas.style.width=(GAME_W*scale)+"px";
  canvas.style.height=(GAME_H*scale)+"px";
}
window.addEventListener("resize",resizeCanvasCSS);
window.addEventListener("orientationchange",()=>setTimeout(resizeCanvasCSS,250));
resizeCanvasCSS();

function pointerToGame(clientX,clientY){
  const rect=canvas.getBoundingClientRect();
  return {x:(clientX-rect.left)*(GAME_W/rect.width),y:(clientY-rect.top)*(GAME_H/rect.height)};
}
function movePlayerTo(clientX,clientY){
  if(!started || ended) return;
  const p=pointerToGame(clientX,clientY);
  player.x=Math.max(12,Math.min(GAME_W-12,p.x));
  player.y=Math.max(12,Math.min(GAME_H-12,p.y));
}
canvas.addEventListener("pointerdown",e=>{e.preventDefault();canvas.setPointerCapture(e.pointerId);movePlayerTo(e.clientX,e.clientY)});
canvas.addEventListener("pointermove",e=>{e.preventDefault();movePlayerTo(e.clientX,e.clientY)});
canvas.addEventListener("pointerup",e=>e.preventDefault());
document.addEventListener("touchmove",e=>e.preventDefault(),{passive:false});
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

const joystick=document.getElementById("joystick");
const stick=document.getElementById("stick");

function updateJoystick(clientX,clientY){
  const rect=joystick.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;
  let dx=clientX-cx, dy=clientY-cy;
  const max=38;
  const len=Math.hypot(dx,dy);
  if(len>max){dx=dx/len*max;dy=dy/len*max;}
  joy.dx=dx/max;
  joy.dy=dy/max;
  stick.style.left=(38+dx)+"px";
  stick.style.top=(38+dy)+"px";
}
joystick.addEventListener("pointerdown",e=>{
  e.preventDefault();
  joystick.setPointerCapture(e.pointerId);
  joy.active=true;
  updateJoystick(e.clientX,e.clientY);
});
joystick.addEventListener("pointermove",e=>{
  if(!joy.active) return;
  e.preventDefault();
  updateJoystick(e.clientX,e.clientY);
});
function resetJoystick(){
  joy.active=false;joy.dx=0;joy.dy=0;
  stick.style.left="38px";stick.style.top="38px";
}
joystick.addEventListener("pointerup",resetJoystick);
joystick.addEventListener("pointercancel",resetJoystick);

document.getElementById("startBtn").onclick=startGame;
document.getElementById("againBtn").onclick=()=>location.reload();

function sound(freq=440,dur=.08,type="sine",vol=.18){
  if(!audioCtx) return;
  if(audioCtx.state==="suspended") audioCtx.resume();
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.value=vol;
  o.connect(g);g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.stop(audioCtx.currentTime+dur);
}
function noise(dur=.15,vol=.16){
  if(!audioCtx) return;
  if(audioCtx.state==="suspended") audioCtx.resume();
  const buffer=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
  const data=buffer.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i]=Math.random()*2-1;
  const src=audioCtx.createBufferSource(), g=audioCtx.createGain();
  src.buffer=buffer;g.gain.value=vol;
  src.connect(g);g.connect(audioCtx.destination);
  src.start();g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
}


function unlockAudio(){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended") audioCtx.resume();
  sound(880,.04,"sine",.08);
}
document.addEventListener("pointerdown",unlockAudio,{once:true});
document.addEventListener("touchstart",unlockAudio,{once:true,passive:true});

function startGame(){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended") audioCtx.resume();
  sound(660,.12,"square",.18);
  menu.hidden=true;gameover.hidden=true;hud.hidden=false;

  difficulty=getDifficulty();
  player={x:GAME_W/2,y:GAME_H-100,r:9,speed:6,hp:64,shield:0,shieldEnd:0,invUntil:0};
  bullets=[];lasers=[];items=[];dash=null;sonicRings=[];
  boss={x:GAME_W/2,y:105,r:38};
  score=0;ended=false;started=true;
  startTime=Date.now();lastAttack=0;lastItem=Date.now();lastDash=Date.now()-7000;

  if(difficulty==="easy"){duration=20;attackGap=1250;bulletSpeed=3.0;}
  if(difficulty==="normal"){duration=40;attackGap=900;bulletSpeed=4.0;}
  if(difficulty==="hard"){duration=60;attackGap=650;bulletSpeed=4.8;}

  requestAnimationFrame(loop);
}

function rand(min,max){return min+Math.random()*(max-min)}
function addBullet(x,y,vx,vy,r,type,color){bullets.push({x,y,vx,vy,r,type,color,rot:rand(0,Math.PI*2)})}

function attack(){
  if(dash) return;
  const canDash=difficulty!=="easy" && Date.now()-lastDash>=10000;
  const r=Math.random();
  if(canDash && r<0.12){
    dashAttack();
    lastDash=Date.now();
  }
  else if(r<0.58) sideBulletWaves();
  else if(r<0.76) circleBurst();
  else if(r<0.90) spiralBurst();
  else laserAttack();
}

function sideBulletWaves(){
  sound(350,.06,"triangle",.10);
  const pairs=[["left","right"],["top","right"],["bottom","left"],["top","bottom"],["left","top"],["right","bottom"]];
  const pair=pairs[Math.floor(Math.random()*pairs.length)];
  const waves=difficulty==="easy"?2:(difficulty==="normal"?3:4);
  const perWave=difficulty==="hard"?3:3;
  for(let w=0;w<waves;w++){
    setTimeout(()=>{
      if(ended || dash) return;
      for(const dir of pair){
        for(let i=0;i<perWave;i++) spawnFromDir(dir);
      }
      sound(420,.035,"square",.08);
    },w*(difficulty==="hard"?140:190));
  }
}
function spawnFromDir(dir){
  let x,y,vx,vy,s=bulletSpeed+rand(-.3,1.1);
  if(dir==="top"){x=rand(20,880);y=-20;vx=rand(-.65,.65);vy=s}
  if(dir==="right"){x=920;y=rand(30,580);vx=-s;vy=rand(-.65,.65)}
  if(dir==="bottom"){x=rand(20,880);y=620;vx=rand(-.65,.65);vy=-s}
  if(dir==="left"){x=-20;y=rand(30,580);vx=s;vy=rand(-.65,.65)}
  const shapes=["blade","triangle","square"];
  const colors=["#ff9f1c","#ff4d6d","#00f5d4","#c77dff"]; addBullet(x,y,vx,vy,5.5,shapes[Math.floor(Math.random()*shapes.length)],colors[Math.floor(Math.random()*colors.length)]);
}
function circleBurst(){
  sound(520,.08,"sawtooth",.11);
  const n=difficulty==="hard"?24:20;
  for(let i=0;i<n;i++){
    const a=i*Math.PI*2/n;
    addBullet(boss.x,boss.y,Math.cos(a)*bulletSpeed,Math.sin(a)*bulletSpeed,5.5,"diamond","#67d8ff");
  }
}
function spiralBurst(){
  sound(760,.07,"triangle",.11);
  const base=performance.now()/300;
  const count=difficulty==="hard"?14:11;
  for(let i=0;i<count;i++){
    const a=base+i*.42;
    addBullet(boss.x,boss.y,Math.cos(a)*(bulletSpeed+.35),Math.sin(a)*(bulletSpeed+.35),5.5,"blade","#ffd85a");
  }
}
function laserAttack(){
  sound(220,.22,"sine",.13);
  const colors=["#ff1133","#00e5ff","#b14cff","#ffee00","#00ff77"];
  const count=difficulty==="hard"?2:(difficulty==="normal"?1:1);
  for(let i=0;i<count;i++){
    const vertical=Math.random()<0.5, color=colors[Math.floor(Math.random()*colors.length)];
    if(vertical) lasers.push({x:rand(80,800),y:0,w:24,h:GAME_H,t:Date.now()+i*160,hit:false,color});
    else lasers.push({x:0,y:rand(120,540),w:GAME_W,h:24,t:Date.now()+i*160,hit:false,color});
  }
}
function dashAttack(){
  sound(150,.45,"sawtooth",.16);
  const dx=player.x-boss.x, dy=player.y-boss.y;
  const len=Math.hypot(dx,dy)||1;
  dash={state:"warn",t:Date.now(),sx:boss.x,sy:boss.y,tx:player.x,ty:player.y,ux:dx/len,uy:dy/len,width:52,hit:false};
}
function spawnItem(){
  const type=Math.random()<0.55?"shield":"heal";
  items.push({x:rand(60,840),y:rand(150,540),r:15,type,t:Date.now()});
  sound(type==="shield"?900:640,.08,"sine",.12);
}

function applyDamage(amount){
  const now=Date.now();
  if(now<player.invUntil) return;
  let remain=amount;
  if(player.shield>0 && now<player.shieldEnd){
    const block=Math.min(10,remain,player.shield);
    player.shield-=block;remain-=block;sound(900,.06,"square",.13);
  }
  if(remain>0){
    player.hp=Math.max(0,player.hp-remain);
    player.invUntil=now+250;noise(.08,.14);shake=10;
  }
  if(player.hp<=0) finish();
}
function collectItem(item){
  if(item.type==="shield"){player.shield=10;player.shieldEnd=Date.now()+8000;sound(1000,.12,"triangle",.15)}
  else{player.hp=Math.min(64,player.hp+5);sound(720,.12,"sine",.15)}
}

function hitCircle(a,b){return Math.hypot(a.x-b.x,a.y-b.y)<a.r+b.r}
function hitRectCircle(rect,cir){
  const cx=Math.max(rect.x,Math.min(cir.x,rect.x+rect.w)), cy=Math.max(rect.y,Math.min(cir.y,rect.y+rect.h));
  return Math.hypot(cir.x-cx,cir.y-cy)<cir.r;
}
function hitLineCircle(x1,y1,x2,y2,width,c){
  const dx=x2-x1, dy=y2-y1, len2=dx*dx+dy*dy;
  const t=Math.max(0,Math.min(1,((c.x-x1)*dx+(c.y-y1)*dy)/len2));
  const px=x1+t*dx, py=y1+t*dy;
  return Math.hypot(c.x-px,c.y-py)<width/2+c.r;
}

function finish(){
  if(ended) return;
  ended=true;hud.hidden=true;gameover.hidden=false;finalScoreEl.textContent=score;
  sound(120,.4,"sawtooth",.16);
  const key="fd_scores_sonic_"+difficulty;
  let arr=JSON.parse(localStorage.getItem(key)||"[]");
  arr.push({score:score,date:new Date().toLocaleString("vi-VN")});
  arr.sort((a,b)=>b.score-a.score);arr=arr.slice(0,5);
  localStorage.setItem(key,JSON.stringify(arr));
  let t="<tr><th>Hạng</th><th>Điểm</th><th>Lúc</th></tr>";
  arr.forEach((row,i)=>t+=`<tr><td>${i+1}</td><td>${row.score}</td><td>${row.date}</td></tr>`);
  leaderEl.innerHTML=t;
}

function drawPlayerStar(x,y){
  ctx.save();
  ctx.translate(x,y);
  ctx.shadowColor="#ffffff";ctx.shadowBlur=14;
  ctx.fillStyle="#ffffff";
  ctx.beginPath();
  const pts=[
    [0,-15],[3,-3],[15,0],[3,3],[0,15],[-3,3],[-15,0],[-3,-3]
  ];
  ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
  if(player.shield>0 && Date.now()<player.shieldEnd){
    ctx.strokeStyle="#69d8ff";ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,21,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();
}
function drawBullet(b){
  ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.rot+=0.12);ctx.fillStyle=b.color;ctx.strokeStyle="#d8f7ff";ctx.lineWidth=2;
  if(b.type==="blade"){
    ctx.beginPath();ctx.moveTo(0,-9);ctx.lineTo(6,0);ctx.lineTo(0,9);ctx.lineTo(-4,0);ctx.closePath();ctx.fill();ctx.stroke();
  }else if(b.type==="triangle"){
    ctx.beginPath();ctx.moveTo(0,-9);ctx.lineTo(8,7);ctx.lineTo(-8,7);ctx.closePath();ctx.fill();ctx.stroke();
  }else if(b.type==="square"){
    ctx.fillRect(-6,-6,12,12);ctx.strokeRect(-6,-6,12,12);
  }else if(b.type==="diamond"){
    ctx.rotate(Math.PI/4);ctx.fillRect(-b.r,-b.r,b.r*2,b.r*2);
  }else{
    ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}
function drawItem(it){
  ctx.save();ctx.translate(it.x,it.y);
  if(it.type==="shield"){
    ctx.strokeStyle="#69d8ff";ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,0,it.r,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle="#69d8ff";ctx.font="16px Arial";ctx.fillText("S",-5,6);
  }else{
    ctx.fillStyle="#42ff75";ctx.fillRect(-12,-4,24,8);ctx.fillRect(-4,-12,8,24);
  }
  ctx.restore();
}
function drawBoss(){
  ctx.fillStyle="#9b2cff";ctx.shadowColor="#9b2cff";ctx.shadowBlur=15;
  ctx.beginPath();ctx.arc(boss.x,boss.y,boss.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle="#fff";ctx.font="18px Arial";ctx.fillText("BOSS",boss.x-24,boss.y+6);
}
function drawSonicRings(){
  sonicRings=sonicRings.filter(r=>Date.now()-r.t<620);
  for(const r of sonicRings){
    const age=Date.now()-r.t, p=age/620;
    ctx.save();
    ctx.translate(r.x,r.y);
    ctx.rotate(r.angle);
    ctx.strokeStyle=`rgba(200,240,255,${1-p})`;
    ctx.lineWidth=4*(1-p)+1;
    ctx.beginPath();
    ctx.ellipse(0,0,40+p*140,12+p*28,0,0,Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }
}

function loop(){
  if(!started || ended) return;
  const sx=shake?rand(-shake,shake):0, sy=shake?rand(-shake,shake):0;
  if(shake>0) shake*=0.85;
  ctx.save();ctx.translate(sx,sy);
  ctx.clearRect(-20,-20,GAME_W+40,GAME_H+40);

  const now=Date.now(), elapsed=(now-startTime)/1000;
  const remain=Math.max(0,Math.ceil(duration-elapsed));
  score=Math.floor(elapsed*10);
  scoreEl.textContent=score;timeEl.textContent=remain;
  nextAttackEl.textContent=dash?"DASH":Math.max(0,((attackGap-(now-lastAttack))/1000)).toFixed(1);
  hpText.textContent=Math.ceil(player.hp);hpFill.style.width=(player.hp/64*100)+"%";
  shieldText.textContent=(player.shield>0 && now<player.shieldEnd)?Math.ceil(player.shield)+" / "+Math.ceil((player.shieldEnd-now)/1000)+"s":"0";

  if(now-lastItem>=15000){spawnItem();lastItem=now}
  if(!dash && now-lastAttack>=attackGap){attack();lastAttack=now}

  let mx=0,my=0;
  if(keys.w) my-=1;
  if(keys.s) my+=1;
  if(keys.a) mx-=1;
  if(keys.d) mx+=1;
  if(joy.active){mx+=joy.dx*1.15;my+=joy.dy*1.15;}
  const mlen=Math.hypot(mx,my);
  if(mlen>1){mx/=mlen;my/=mlen;}
  player.x+=mx*player.speed;
  player.y+=my*player.speed;
  player.x=Math.max(12,Math.min(GAME_W-12,player.x));player.y=Math.max(12,Math.min(GAME_H-12,player.y));

  ctx.strokeStyle="rgba(88,200,255,.08)";
  for(let x=0;x<=GAME_W;x+=45){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,GAME_H);ctx.stroke()}
  for(let y=0;y<=GAME_H;y+=45){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(GAME_W,y);ctx.stroke()}

  if(dash){
    const age=now-dash.t, far=1000, x2=dash.sx+dash.ux*far, y2=dash.sy+dash.uy*far;
    if(age<1000){
      ctx.strokeStyle="rgba(255,70,70,.35)";ctx.lineWidth=dash.width;
      ctx.beginPath();ctx.moveTo(dash.sx,dash.sy);ctx.lineTo(x2,y2);ctx.stroke();
      ctx.strokeStyle="#ff5555";ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(dash.sx,dash.sy);ctx.lineTo(x2,y2);ctx.stroke();
    }else if(age<1380){
      const p=(age-1000)/380;
      boss.x=dash.sx+(dash.ux*620)*p;boss.y=dash.sy+(dash.uy*620)*p;
      ctx.strokeStyle="#ff1717";ctx.lineWidth=dash.width;ctx.shadowColor="#ff1717";ctx.shadowBlur=22;
      ctx.beginPath();ctx.moveTo(dash.sx,dash.sy);ctx.lineTo(x2,y2);ctx.stroke();ctx.shadowBlur=0;
      if(Math.floor(age/80)%2===0) sonicRings.push({x:boss.x,y:boss.y,angle:Math.atan2(dash.uy,dash.ux)+Math.PI/2,t:now});
      shake=22;
      if(!dash.hit && hitLineCircle(dash.sx,dash.sy,x2,y2,dash.width,player)){dash.hit=true;applyDamage(12)}
    }else{
      dash=null;lastAttack=now;shake=14;noise(.14,.17);
    }
  }
  drawSonicRings();
  drawBoss();

  items=items.filter(it=>now-it.t<12000);
  for(let i=items.length-1;i>=0;i--){drawItem(items[i]);if(hitCircle(player,items[i])){collectItem(items[i]);items.splice(i,1)}}
  drawPlayerStar(player.x,player.y);

  bullets=bullets.filter(b=>b.x>-80&&b.x<980&&b.y>-80&&b.y<680);
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx;b.y+=b.vy;drawBullet(b);
    if(hitCircle(player,b)){bullets.splice(i,1);applyDamage(3)}
  }

  lasers=lasers.filter(l=>now-l.t<1700);
  for(const l of lasers){
    const age=now-l.t;if(age<0) continue;
    if(age<900){
      ctx.fillStyle=l.color+"44";ctx.fillRect(l.x,l.y,l.w,l.h);
      ctx.strokeStyle=l.color;ctx.strokeRect(l.x,l.y,l.w,l.h);
    }else{
      ctx.fillStyle=l.color;ctx.shadowColor=l.color;ctx.shadowBlur=22;
      ctx.fillRect(l.x,l.y,l.w,l.h);ctx.shadowBlur=0;
      if(!l.hit && hitRectCircle(l,player)){l.hit=true;applyDamage(10)}
    }
  }

  ctx.restore();
  if(remain<=0) finish();
  requestAnimationFrame(loop);
}
ctx.fillStyle="#05070d";ctx.fillRect(0,0,GAME_W,GAME_H);
</script>
